<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — MediFiches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-shell { width: 100%; max-width: 420px; margin: 0 auto; padding: var(--space-5); }
    .auth-logo { text-align: center; margin-bottom: var(--space-8); }
    .auth-logo__title { font-family: var(--font-display); font-size: 28px; color: var(--text); }
    .auth-logo__title em { color: var(--brand-mid); font-style: italic; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); padding: var(--space-8); box-shadow: var(--shadow-md); }
    .auth-card__title { font-family: var(--font-display); font-size: 22px; color: var(--text); margin-bottom: var(--space-6); }
    .auth-field { margin-bottom: var(--space-4); }
    .auth-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: var(--space-2); }
    .auth-input { width: 100%; padding: var(--space-3) var(--space-4); border: 1.5px solid var(--border-strong); border-radius: var(--r-md); background: var(--surface); font-family: var(--font-body); font-size: 15px; color: var(--text); outline: none; transition: border-color var(--t-fast); }
    .auth-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
    .auth-btn { width: 100%; padding: var(--space-4); background: var(--brand); color: white; border: none; border-radius: var(--r-md); font-family: var(--font-body); font-size: 15px; font-weight: 500; cursor: pointer; transition: background var(--t-fast); margin-top: var(--space-2); }
    .auth-btn:hover { background: var(--brand-mid); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger-text); border-radius: var(--r-md); padding: var(--space-3) var(--space-4); font-size: 13px; margin-bottom: var(--space-4); display: none; }
    .auth-error.visible { display: block; }
    .auth-success { background: var(--brand-xlight); border: 1px solid var(--brand-border); color: var(--brand-dark); border-radius: var(--r-md); padding: var(--space-3) var(--space-4); font-size: 13px; margin-bottom: var(--space-4); display: none; }
    .auth-success.visible { display: block; }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-logo">
      <div class="auth-logo__title">Medi<em>Fiches</em></div>
    </div>
    <div class="auth-card">
      <div class="auth-card__title">Nouveau mot de passe</div>
      <div id="reset-error" class="auth-error"></div>
      <div id="reset-success" class="auth-success"></div>
      <div class="auth-field">
        <label class="auth-label" for="new-password">Nouveau mot de passe</label>
        <input class="auth-input" type="password" id="new-password" placeholder="8 caractères minimum">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="new-password2">Confirmer</label>
        <input class="auth-input" type="password" id="new-password2" placeholder="Répéter le mot de passe">
      </div>
      <button class="auth-btn" id="reset-btn" onclick="ResetPage.submit()">Enregistrer le mot de passe</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/core/config.js"></script>
  <script src="../js/core/mf-store.js"></script>
  <script src="../js/core/auth.js"></script>
  <script>
  'use strict';
  const ResetPage = {
    async init() {
      await Auth.init();
      let sessionFound = false;

      // PASSWORD_RECOVERY est émis une fois que Supabase a fini de parser le hash
      // de l'URL (#access_token=...) — c'est le signal fiable, contrairement à
      // interroger la session immédiatement (race condition documentée).
      Auth.onAuthEvent((event, session) => {
        if (event === 'PASSWORD_RECOVERY' && session) {
          sessionFound = true;
          document.getElementById('reset-error').classList.remove('visible');
          document.getElementById('reset-btn').disabled = false;
        }
      });

      // Filet de sécurité : si la session existe déjà (hash traité avant notre arrivée)
      if (await Auth.hasActiveSession()) sessionFound = true;

      // On laisse un court délai pour le cas où onAuthEvent arrive juste après,
      // avant d'afficher l'erreur définitive.
      setTimeout(() => {
        if (!sessionFound) {
          document.getElementById('reset-error').textContent = 'Lien invalide ou expiré. Demandez un nouveau lien.';
          document.getElementById('reset-error').classList.add('visible');
          document.getElementById('reset-btn').disabled = true;
        }
      }, 1200);
    },

    async submit() {
      const pw  = document.getElementById('new-password').value;
      const pw2 = document.getElementById('new-password2').value;
      const btn = document.getElementById('reset-btn');
      const err = document.getElementById('reset-error');
      const ok  = document.getElementById('reset-success');

      if (pw.length < 8) { err.textContent = 'Minimum 8 caractères.'; err.classList.add('visible'); return; }
      if (pw !== pw2) { err.textContent = 'Les mots de passe ne correspondent pas.'; err.classList.add('visible'); return; }

      btn.disabled = true; btn.textContent = 'Enregistrement…'; err.classList.remove('visible');

      const { error } = await Auth.updatePassword(pw);
      if (error) {
        err.textContent = 'Erreur : ' + error.message;
        err.classList.add('visible');
        btn.disabled = false; btn.textContent = 'Enregistrer le mot de passe';
        return;
      }
      ok.textContent = '✅ Mot de passe enregistré ! Redirection…';
      ok.classList.add('visible');
      btn.style.display = 'none';
      setTimeout(() => { window.location.href = '../index.html'; }, 2000);
    }
  };
  ResetPage.init();
  </script>
</body>
</html>
